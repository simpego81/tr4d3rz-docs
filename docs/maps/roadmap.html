<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roadmap — TR4D3RZ Project Map</title>
  <link rel="stylesheet" href="../shared/design-tokens.css">
  <link rel="stylesheet" href="../shared/base.css">
  <style>
    .milestone-section {
      margin-bottom: var(--space-2xl);
    }

    .milestone-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: var(--space-md);
      padding: var(--space-lg);
      background: linear-gradient(135deg, var(--color-background-alt) 0%, var(--color-surface) 100%);
      border-left: 4px solid var(--color-primary);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-lg);
    }

    .milestone-info h2 {
      margin: 0 0 var(--space-sm) 0;
    }

    .milestone-meta {
      display: flex;
      gap: var(--space-sm);
      flex-wrap: wrap;
      align-items: center;
    }

    .task-list {
      list-style: none;
      padding: 0;
      display: grid;
      gap: var(--space-md);
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: var(--space-md);
      padding: var(--space-md);
      background-color: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      transition: border-color var(--transition-base);
    }

    .task-item:hover {
      border-color: var(--color-primary);
    }

    .task-status-indicator {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--font-size-xs);
      margin-top: 2px;
    }

    .task-status-indicator.completed {
      background-color: var(--color-status-completed);
      color: white;
    }

    .task-status-indicator.in-progress {
      background-color: var(--color-status-in-progress);
      color: white;
    }

    .task-status-indicator.ready {
      background-color: var(--color-status-ready);
      color: white;
    }

    .task-status-indicator.blocked {
      background-color: var(--color-status-blocked);
      color: white;
    }

    .task-status-indicator.planned {
      background-color: var(--color-status-planned);
      color: white;
    }

    .task-content {
      flex: 1;
      min-width: 0;
    }

    .task-title {
      font-weight: var(--font-weight-semibold);
      margin-bottom: var(--space-xs);
    }

    .task-summary {
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
      margin-bottom: var(--space-sm);
    }

    .task-badges {
      display: flex;
      gap: var(--space-sm);
      flex-wrap: wrap;
    }

    .critical-path-badge {
      background-color: #dc2626;
      color: white;
      padding: 0.125rem 0.375rem;
      border-radius: var(--radius-sm);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
    }

    .dependency-count {
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
    }

    @media (max-width: 640px) {
      .milestone-header {
        flex-direction: column;
      }

      .task-item {
        flex-direction: column;
        gap: var(--space-sm);
      }
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <header class="header">
    <div class="container header-content">
      <h1 class="header-title"><a href="../index-new.html" style="color: inherit;">TR4D3RZ</a></h1>
      <nav class="header-nav" role="navigation">
        <a href="../index-new.html">← Project Map</a>
        <a href="conceptual.html">Conceptual</a>
        <a href="physical.html">Physical</a>
        <a href="agents.html">Agents</a>
      </nav>
    </div>
  </header>

  <main class="main" id="main-content">
    <div class="container">
      <div class="breadcrumb">
        <a href="../index-new.html">Project Map</a>
        <span class="breadcrumb-separator">/</span>
        <span>Roadmap</span>
      </div>

      <h1>Roadmap Timeline</h1>
      <p class="text-muted mb-xl">
        Project milestones, tasks, dependencies, and critical path analysis.
      </p>

      <div id="roadmap-content">
        <div class="loading" role="status">
          <span>Loading roadmap data...</span>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>
        TR4D3RZ Documentation &mdash;
        <span id="build-timestamp">Loading...</span>
      </p>
    </div>
  </footer>

  <script src="../shared/data-loader.js"></script>
  <script>
    (async function() {
      try {
        const roadmap = await DataLoader.loadRoadmap();
        const manifest = await DataLoader.loadManifest();

        renderRoadmap(roadmap);

        document.getElementById('build-timestamp').textContent =
          `Generated ${DataLoader.formatTimestamp(manifest.generated_at)}`;

      } catch (error) {
        console.error('[Roadmap] Failed to load data:', error);
        DataLoader.renderError(document.getElementById('roadmap-content'), error);
      }
    })();

    function renderRoadmap(roadmap) {
      const milestones = roadmap.milestones || [];
      const tasks = roadmap.tasks || [];

      // Build task lookup
      const tasksById = {};
      tasks.forEach(task => {
        tasksById[task.id] = task;
      });

      const content = document.getElementById('roadmap-content');
      const milestonesHtml = milestones.map(milestone => renderMilestone(milestone, tasksById)).join('');

      content.innerHTML = milestonesHtml || '<p class="text-muted">No milestones found.</p>';
    }

    function renderMilestone(milestone, tasksById) {
      const rawData = milestone.raw_data || {};
      const status = rawData.status || 'UNKNOWN';
      const health = rawData.health || 'UNKNOWN';
      const taskIds = rawData.tasks || [];

      // Filter tasks for this milestone
      const milestoneTasks = taskIds
        .map(id => tasksById[id])
        .filter(Boolean);

      const tasksHtml = milestoneTasks.map(task => renderTask(task)).join('');

      return `
        <section class="milestone-section">
          <div class="milestone-header">
            <div class="milestone-info">
              <h2>${DataLoader.escapeHtml(milestone.name)}</h2>
              <p class="text-muted">${DataLoader.escapeHtml(milestone.summary || '')}</p>
            </div>
            <div class="milestone-meta">
              <span class="${DataLoader.getStatusBadgeClass(status)}">${status}</span>
              <span class="${DataLoader.getHealthBadgeClass(health)}">${health}</span>
              ${rawData.critical_path ? '<span class="critical-path-badge">CRITICAL PATH</span>' : ''}
            </div>
          </div>

          ${milestoneTasks.length > 0 ? `
            <ul class="task-list">
              ${tasksHtml}
            </ul>
          ` : '<p class="text-muted text-sm">No tasks assigned to this milestone.</p>'}
        </section>
      `;
    }

    function renderTask(task) {
      const rawData = task.raw_data || {};
      const status = rawData.status || 'UNKNOWN';
      const health = rawData.health || 'UNKNOWN';
      const deps = rawData.dependencies || [];
      const isCritical = rawData.critical_path || false;

      const statusIcon = getStatusIcon(status);
      const statusClass = status.toLowerCase().replace(/_/g, '-');

      return `
        <li class="task-item">
          <div class="task-status-indicator ${statusClass}" title="Status: ${status}">
            ${statusIcon}
          </div>
          <div class="task-content">
            <div class="task-title">${DataLoader.escapeHtml(task.name)}</div>
            <div class="task-summary">${DataLoader.escapeHtml(task.summary || '')}</div>
            <div class="task-badges">
              <span class="${DataLoader.getStatusBadgeClass(status)}">${status}</span>
              <span class="${DataLoader.getHealthBadgeClass(health)}">${health}</span>
              ${isCritical ? '<span class="critical-path-badge">CRITICAL</span>' : ''}
              ${deps.length > 0 ? `<span class="dependency-count">📎 ${deps.length} dep${deps.length > 1 ? 's' : ''}</span>` : ''}
            </div>
          </div>
        </li>
      `;
    }

    function getStatusIcon(status) {
      const icons = {
        'COMPLETED': '✓',
        'IN_PROGRESS': '⟳',
        'READY': '○',
        'BLOCKED': '✕',
        'PLANNED': '·',
        'UNKNOWN': '?'
      };
      return icons[status] || '?';
    }
  </script>
</body>
</html>
